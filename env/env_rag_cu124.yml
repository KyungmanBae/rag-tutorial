name: rag_env_cu124
channels:
  - conda-forge

dependencies:
  - python=3.10
  - pip
  - pip:
      # GPU Torch (CUDA 12.4 wheels)
      - torch --index-url https://download.pytorch.org/whl/cu124
      - torchvision --index-url https://download.pytorch.org/whl/cu124
      - torchaudio --index-url https://download.pytorch.org/whl/cu124

      # UI
      - gradio==6.8.0
      - gradio_client==1.5.1
      - fastapi
      - uvicorn

      # HF / LLM
      - transformers==5.2.0
      - accelerate
      - safetensors
      - huggingface_hub
      - tokenizers

      # External search
      - ddgs
      - wikipedia-api

      # Quantization
      - bitsandbytes>=0.46.1

      # Datasets
      - datasets

      # NLP / Retrieval
      - konlpy
      - rank_bm25
      - sentence-transformers
      - numpy==1.26.4
      - faiss-gpu

      # LlamaIndex
      - llama-index
      - llama-index-vector-stores-faiss
      - llama-index-embeddings-huggingface
